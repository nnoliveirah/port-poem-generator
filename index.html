<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Portuguese Poem Generator</title>
    <link rel="stylesheet" href="src/styles.css" />
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>AI Portuguese Poem Generator</h1>
      </header>

      <main>
        <div class="form-container">
          <form id="poem-generator-form">
            <input
              class="instructions"
              type="text"
              placeholder="Enter the topic of the Portuguese poem"
              autofocus
              required
              autocomplete="off"
              id="user-instructions" />
            <input type="submit" class="submit-button" />
          </form>
          <div class="hint">i.e: Flores, Amor or Samba</div>
        </div>
        <div class="poem" id="poem"></div>
        <div class="poem hidden" id="poem"></div>
      </main>
      <footer>
        <p>
          This AI project was coded by
          <a href="https://github.com/nnoliveirah" target="_blank">Nath</a> and
          is
          <a
            href="https://github.com/nnoliveirah/port-poem-generator"
            target="_blank">
            open-sourced on GitHub</a
          >
          and is
          <a href="https://portpoemgenerator.netlify.app/" target="_blank">
            hosted on Netlify</a
          >.
        </p>
      </footer>
    </div>
  </body>
  <script src="src/index.js"></script>
</html>
